<style>
:root{
  --bg:#f5f5f7;--card:#fff;--border:#e8e8ed;
  --t1:#1d1d1f;--t2:#6e6e73;--t3:#aeaeb2;
  --accent:#ff6b6b;--accent-light:#fff0f0;
  --grn:#30c48d;--grn-light:#edfaf4;
  --red:#ff5252;--red-light:#fff0f0;
  --blu:#5b8dee;--blu-light:#eef3ff;
  --amb:#ffb347;--amb-light:#fff8ee;
  --pur:#a78bfa;--pur-light:#f3eeff;
  --cyn:#2dd4bf;--cyn-light:#edfaf8;
  --pnk:#f472b6;--pnk-light:#fdf2f8;
  --org:#fb923c;--org-light:#fff7ed;
  --pill:#f2f2f7;
  --shadow:0 2px 20px rgba(0,0,0,.07);
  --radius:18px;--radius-sm:12px;
  --font-jp:'Noto Sans JP',sans-serif;
  --font-en:'Inter',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-jp);background:var(--bg);color:var(--t1);min-height:100vh}
header{background:linear-gradient(135deg,#fff8f6 0%,#f0f4ff 50%,#f5fdf9 100%);border-bottom:1px solid var(--border);padding:32px 40px 24px;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.header-inner{max-width:1200px;margin:0 auto}
.header-top{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:16px}
.header-badge{display:inline-flex;align-items:center;gap:6px;background:var(--blu-light);color:var(--blu);font-size:11px;font-weight:600;padding:4px 12px;border-radius:100px;letter-spacing:.05em;margin-bottom:8px}
.header-badge::before{content:'';display:inline-block;width:6px;height:6px;background:var(--blu);border-radius:50%}
h1{font-size:clamp(20px,3vw,28px);font-weight:700;color:var(--t1);line-height:1.3}
h1 span{color:var(--accent)}
.header-sub{font-size:13px;color:var(--t2);margin-top:6px}
.header-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.update-date{font-family:var(--font-en);font-size:12px;color:var(--t3);font-weight:500}
.disclaimer-h{font-size:10px;color:var(--t3);max-width:280px;text-align:right;line-height:1.5}
.search-wrap{position:relative;max-width:380px}
.search-wrap input{width:100%;padding:10px 16px 10px 40px;background:var(--card);border:1.5px solid var(--border);border-radius:100px;color:var(--t1);font-size:13px;font-family:var(--font-jp);outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:var(--blu)}
.search-wrap input::placeholder{color:var(--t3)}
.search-wrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--t3);width:16px;height:16px}
main{max-width:1200px;margin:0 auto;padding:28px 40px 48px}
.sector-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid rgba(0,0,0,.04);margin-bottom:24px;overflow:hidden;animation:fu .4s ease forwards;opacity:0}
@keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.sector-head{display:flex;align-items:center;gap:12px;padding:20px 24px 16px;border-bottom:1px solid var(--border)}
.sector-icon{width:40px;height:40px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sector-label{font-size:16px;font-weight:700;color:var(--t1);letter-spacing:-.2px}
.sector-cnt{font-family:var(--font-en);font-size:11px;font-weight:600;color:var(--t3);background:var(--pill);padding:3px 10px;border-radius:100px;margin-left:auto}
table{width:100%;border-collapse:collapse}
thead th{padding:10px 24px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--t3);text-align:left;background:var(--bg);white-space:nowrap}
tbody tr{transition:background .15s}tbody tr:hover{background:#fafafa}
tbody td{padding:12px 24px;font-size:14px;border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
.tk{font-family:var(--font-en);font-weight:700;font-size:14px;color:var(--t1);letter-spacing:.02em}
.cn{font-size:12px;color:var(--t2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px}
.pr{font-family:var(--font-en);font-weight:600;font-size:14px;color:var(--t1)}
.chg{font-family:var(--font-en);font-weight:600;font-size:12px;padding:3px 10px;border-radius:100px;display:inline-block}
.chg.up{background:var(--grn-light);color:var(--grn)}
.chg.dn{background:var(--red-light);color:var(--red)}
.nr{text-align:center;padding:60px 20px;color:var(--t3);font-size:15px}
footer{text-align:center;padding:24px 40px;font-size:11px;color:var(--t3);border-top:1px solid var(--border);line-height:1.7}
@media(max-width:768px){header{padding:20px 16px 16px}main{padding:20px 16px 40px}.header-meta{display:none}h1{font-size:20px}.sector-head{padding:16px 16px 12px}thead th,tbody td{padding:10px 16px}}
</style>

const SM={

  "Gold & Precious Metals":{i:"⛏️",co:"var(--amb)",bg:"var(--amb-light)"},

};

function render(q){
  let list=D;
  if(q){const lq=q.toLowerCase();list=list.filter(d=>d.s.toLowerCase().includes(lq)||d.n.toLowerCase().includes(lq))}
  const gr={};list.forEach(d=>{if(!gr[d.sec])gr[d.sec]=[];gr[d.sec].push(d)});
  const ord=SO.filter(s=>gr[s]).map(s=>[s,gr[s]]);
  if(!ord.length)return'<div class="nr">該当する銘柄が見つかりません</div>';
  return ord.map(([sec,st],idx)=>{
    const m=SM[sec]||{i:"📌",co:"var(--t2)",bg:"var(--pill)"};
    return`<div class="sector-card" style="animation-delay:${idx*.06}s">
      <div class="sector-head">
        <div class="sector-icon" style="background:${m.bg}">${m.i}</div>
        <span class="sector-label">${sec}</span>
        <span class="sector-cnt">${st.length} 銘柄</span>
      </div>
      <table><thead><tr><th>銘柄</th><th>Price</th><th>変動%</th></tr></thead>
      <tbody>${st.map(d=>{
        const up=d.c>=0;
        return`<tr>
          <td><div class="tk">${d.s}</div><div class="cn">${d.n}</div></td>
          <td class="pr">\$${d.p.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</td>
          <td><span class="chg ${up?'up':'dn'}">${up?'▲':'▼'} ${up?'+':''}${d.c.toFixed(2)}%</span></td>
        </tr>`;
      }).join('')}</tbody></table>
    </div>`;
  }).join('');
}
