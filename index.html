<html lang="ja">

        rel="stylesheet">
    <style>
        :root {
            --bg: #0a0b0f;
            --card: #12141c;
            --hover: #181b26;
            --surf: #1a1d28;
            --bdr: #252836;
            --t1: #e8eaf0;
            --t2: #8b90a5;
            --t3: #5c6180;
            --gold: #f0b90b;
            --grn: #00d68f;
            --red: #ff6b6b;
            --blu: #5b8def;
            --org: #ff9f43;
            --cyn: #0dcaf0;
            --pnk: #f472b6;
            --tl: #2dd4bf
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--t1);
            min-height: 100vh
        }

        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0
        }

        .glow {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(140px);
            opacity: 0.05;
            pointer-events: none;
            z-index: 0
        }

        .g1 {
            top: -200px;
            right: -100px;
            background: var(--gold)
        }

        .g2 {
            bottom: -200px;
            left: -100px;
            background: var(--blu)
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 36px 24px;
            position: relative;
            z-index: 1
        }

        .header {
            margin-bottom: 32px
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 38px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--gold) 0%, #ffd700 50%, var(--org) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
            line-height: 1.1
        }

        .header .sub {
            color: var(--t2);
            font-size: 14px;
            margin-top: 6px
        }

        .header .date {
            display: inline-block;
            margin-top: 10px;
            padding: 4px 14px;
            background: var(--surf);
            border: 1px solid var(--bdr);
            border-radius: 20px;
            font-size: 11px;
            color: var(--t3);
            font-family: 'JetBrains Mono', monospace
        }

        .search-wrap {
            margin-bottom: 28px;
            position: relative;
            max-width: 400px
        }

        .search-wrap input {
            width: 100%;
            padding: 11px 16px 11px 40px;
            background: var(--card);
            border: 1px solid var(--bdr);
            border-radius: 10px;
            color: var(--t1);
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            outline: none;
            transition: border-color .2s;
            direction: ltr;
            text-align: left;
            unicode-bidi: plaintext
        }

        .search-wrap input:focus {
            border-color: var(--gold)
        }

        .search-wrap input::placeholder {
            color: var(--t3)
        }

        .search-wrap svg {
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--t3);
            width: 17px;
            height: 17px
        }

        .sector {
            margin-bottom: 32px;
            animation: fu .45s ease forwards;
            opacity: 0
        }

        @keyframes fu {
            from {
                opacity: 0;
                transform: translateY(14px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .sector-head {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--bdr)
        }

        .sector-icon {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0
        }

        .sector-label {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -.3px
        }

        .sector-cnt {
            font-size: 11px;
            color: var(--t3);
            font-family: 'JetBrains Mono', monospace;
            background: var(--surf);
            padding: 3px 10px;
            border-radius: 20px
        }

        .tw {
            overflow-x: auto
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0
        }

        thead th {
            padding: 8px 14px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--t3);
            text-align: left;
            border-bottom: 1px solid var(--bdr);
            white-space: nowrap
        }

        tbody tr {
            transition: background .2s
        }

        tbody tr:hover {
            background: var(--hover)
        }

        tbody td {
            padding: 10px 14px;
            font-size: 14px;
            border-bottom: 1px solid rgba(37, 40, 54, .5);
            vertical-align: middle
        }

        .tk {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 15px;
            color: var(--gold)
        }

        .cn {
            font-size: 12px;
            color: var(--t2);
            margin-top: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 220px
        }

        .pr {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
            font-size: 14px
        }

        .cp {
            color: var(--grn);
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500
        }

        .cm {
            color: var(--red);
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500
        }

        .nr {
            text-align: center;
            padding: 60px 20px;
            color: var(--t3);
            font-size: 15px
        }

        .disc {
            margin-top: 40px;
            padding: 16px 20px;
            background: var(--surf);
            border: 1px solid var(--bdr);
            border-radius: 10px;
            font-size: 11px;
            color: var(--t3);
            line-height: 1.7
        }

        @media(max-width:768px) {
            .header h1 {
                font-size: 26px
            }

            .container {
                padding: 16px 12px
            }

            tbody td {
                padding: 8px 8px
            }
        }

        ::-webkit-scrollbar {
            width: 6px
        }

        ::-webkit-scrollbar-track {
            background: var(--bg)
        }

        ::-webkit-scrollbar-thumb {
            background: var(--bdr);
            border-radius: 3px
        }
    </style>
</head>

    </div>`;
            }).join('');
        }

        document.getElementById("out").innerHTML = render("");
        document.getElementById("si").addEventListener("input", function () { document.getElementById("out").innerHTML = render(this.value) });
    </script>
