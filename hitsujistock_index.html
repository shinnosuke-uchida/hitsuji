.tw{overflow-x:auto}
table{width:100%;border-collapse:separate;border-spacing:0}
thead th{padding:8px 14px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:var(--t3);text-align:left;border-bottom:1px solid var(--bdr);white-space:nowrap}
tbody tr{transition:background .2s}tbody tr:hover{background:var(--hover)}
tbody td{padding:12px 14px;font-size:14px;border-bottom:1px solid rgba(37,40,54,.5);vertical-align:middle}
.rn{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;color:var(--t3);min-width:28px;display:inline-block;text-align:center}
.rt{background:linear-gradient(135deg,rgba(240,185,11,.18),rgba(240,185,11,.06));color:var(--gold);border-radius:6px;padding:2px 8px}
.tk{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:15px;color:var(--gold)}
.cn{font-size:12px;color:var(--t2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px}
.pr{font-family:'JetBrains Mono',monospace;font-weight:500;font-size:14px}
.cp{color:var(--grn);font-family:'JetBrains Mono',monospace;font-weight:500}
.cm{color:var(--red);font-family:'JetBrains Mono',monospace;font-weight:500}
.sp{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px;padding:4px 10px;border-radius:8px;display:inline-block}
.ss{background:rgba(240,185,11,.14);color:var(--gold)}.sa{background:rgba(0,214,143,.12);color:var(--grn)}.sb{background:rgba(91,141,239,.1);color:var(--blu)}.sc{background:rgba(139,144,165,.1);color:var(--t2)}

.bf{height:100%;border-radius:3px}
.nr{text-align:center;padding:60px 20px;color:var(--t3);font-size:15px}
@media(max-width:768px){.header h1{font-size:26px}.container{padding:16px 12px}tbody td{padding:10px 8px}}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}

function cs(d){
  let i=null,s=null;
  if(d.iC!=null)i=(d.iC/99)*40+((d.iE||0)/99)*20+((d.iR||0)/99)*20+(g2n(d.iS||"--")/10)*10+(g2n(d.iG||"--")/10)*10;
  if(d.sQ!=null)s=(d.sQ/5)*35+((d.sA||0)/5)*15+((d.sW||0)/5)*15+(g2n(d.sV||"--")/10)*8+(g2n(d.sGr||"--")/10)*8+(g2n(d.sP||"--")/10)*7+(g2n(d.sM||"--")/10)*6+(g2n(d.sEr||"--")/10)*6;
  if(i&&s)return i*.5+s*.5;
  return(i||s)*.85;
}
D.forEach(d=>{d.score=cs(d)});

const SO=["Semiconductors & Tech","Gold & Precious Metals","Healthcare & Biotech","Infrastructure & Industrial","Finance & Banking","Energy & Utilities","REIT & Real Estate","Transportation & Logistics","Consumer & Services","Telecom & Software"];
const SM={"Gold & Precious Metals":{i:"⛏️",co:"#f0b90b",bg:"rgba(240,185,11,.08)"},"Semiconductors & Tech":{i:"🔬",co:"#5b8def",bg:"rgba(91,141,239,.08)"},"Healthcare & Biotech":{i:"🧬",co:"#00d68f",bg:"rgba(0,214,143,.08)"},"Infrastructure & Industrial":{i:"🏗️",co:"#ff9f43",bg:"rgba(255,159,67,.08)"},"Energy & Utilities":{i:"⚡",co:"#2dd4bf",bg:"rgba(45,212,191,.08)"},"Finance & Banking":{i:"🏦",co:"#a78bfa",bg:"rgba(167,139,250,.08)"},"REIT & Real Estate":{i:"🏢",co:"#f472b6",bg:"rgba(244,114,182,.08)"},"Transportation & Logistics":{i:"✈️",co:"#0dcaf0",bg:"rgba(13,202,240,.08)"},"Consumer & Services":{i:"🛍️",co:"#fb923c",bg:"rgba(251,146,60,.08)"},"Telecom & Software":{i:"📡",co:"#818cf8",bg:"rgba(129,140,248,.08)"}};

function scl(v){if(v>=85)return"ss";if(v>=75)return"sa";if(v>=65)return"sb";return"sc"}
function bcl(v){if(v>=85)return"var(--gold)";if(v>=75)return"var(--grn)";if(v>=65)return"var(--blu)";return"var(--t3)"}

function render(q){
  let list=D;
  if(q){const lq=q.toLowerCase();list=list.filter(d=>d.s.toLowerCase().includes(lq)||d.n.toLowerCase().includes(lq))}
  const gr={};list.forEach(d=>{if(!gr[d.sec])gr[d.sec]=[];gr[d.sec].push(d)});
  Object.values(gr).forEach(g=>g.sort((a,b)=>b.score-a.score));
  const ord=SO.filter(s=>gr[s]).map(s=>[s,gr[s]]);
  if(!ord.length)return'<div class="nr">該当する銘柄が見つかりません</div>';
  return ord.map(([sec,st],idx)=>{
    const m=SM[sec]||{i:"📌",co:"#8b90a5",bg:"rgba(139,144,165,.08)"};
    return`<div class="sector" style="animation-delay:${idx*.07}s"><div class="sector-head"><div class="sector-icon" style="background:${m.bg}">${m.i}</div><span class="sector-label" style="color:${m.co}">${sec}</span><span class="sector-cnt">${st.length}</span></div><div class="tw"><table><thead><tr><th style="width:44px">Rank</th><th>銘柄</th><th>スコア</th><th>Price</th><th>変動%</th></tr></thead><tbody>${st.map((d,i)=>`<tr><td><span class="rn ${i<3?'rt':''}">${i+1}</span></td><td><div class="tk">${d.s}</div><div class="cn">${d.n}</div></td><td><span class="sp ${scl(d.score)}">${d.score.toFixed(1)}</span><div class="bw"><div class="bf" style="width:${d.score}%;background:${bcl(d.score)}"></div></div></td><td class="pr">$${d.p.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</td><td class="${d.c>=0?'cp':'cm'}">${d.c>=0?'+':''}${d.c.toFixed(2)}%</td></tr>`).join('')}</tbody></table></div></div>`;
  }).join('');
}

document.getElementById("out").innerHTML=render("");
document.getElementById("si").addEventListener("input",function(){document.getElementById("out").innerHTML=render(this.value)});
